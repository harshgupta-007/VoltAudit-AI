version: '3.8'

services:
  backend:
    build:
      context: ../
      dockerfile: deploy/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - DATABASE_URL=sqlite:///./voltaudit.db
      - LOG_LEVEL=INFO
    volumes:
      - sqlite_data:/app/mcp/voltaudit_mcp

  frontend:
    build:
      context: ../
      dockerfile: deploy/Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://backend:8000/api/v1
    depends_on:
      - backend

volumes:
  sqlite_data:
