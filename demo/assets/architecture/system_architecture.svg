<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#0f172a" rx="20" />

  <text x="500" y="50" font-family="'Outfit', sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">SYSTEM WORKFLOW INTERACTION SEQUENCE</text>

  <!-- Lifelines -->
  <g transform="translate(100, 100)">
    <!-- Actors Headers -->
    <rect x="0" y="0" width="120" height="40" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5" />
    <text x="60" y="25" font-family="'Outfit', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">FastAPI Backend</text>

    <rect x="250" y="0" width="120" height="40" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5" />
    <text x="310" y="25" font-family="'Outfit', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">ADK Orchestrator</text>

    <rect x="500" y="0" width="120" height="40" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5" />
    <text x="560" y="25" font-family="'Outfit', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">FastMCP Server</text>

    <rect x="750" y="0" width="120" height="40" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5" />
    <text x="810" y="25" font-family="'Outfit', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">SQLite Database</text>

    <!-- Lifeline Vertical Lines -->
    <line x1="60" y1="40" x2="60" y2="500" stroke="#334155" stroke-dasharray="5,5" stroke-width="2" />
    <line x1="310" y1="40" x2="310" y2="500" stroke="#334155" stroke-dasharray="5,5" stroke-width="2" />
    <line x1="560" y1="40" x2="560" y2="500" stroke="#334155" stroke-dasharray="5,5" stroke-width="2" />
    <line x1="810" y1="40" x2="810" y2="500" stroke="#334155" stroke-dasharray="5,5" stroke-width="2" />

    <!-- Message Arrows -->
    <!-- Message 1 -->
    <line x1="60" y1="100" x2="300" y2="100" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />
    <text x="180" y="90" font-family="'Outfit', sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">1. Trigger pipeline</text>

    <!-- Message 2 -->
    <line x1="310" y1="180" x2="550" y2="180" stroke="#ffffff" stroke-width="2" />
    <text x="430" y="170" font-family="'Outfit', sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">2. Invoke MCP Tool</text>

    <!-- Message 3 -->
    <line x1="560" y1="260" x2="800" y2="260" stroke="#ffffff" stroke-width="2" />
    <text x="680" y="250" font-family="'Outfit', sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">3. Bounded SQL Query</text>

    <!-- Message 4 (Return) -->
    <line x1="800" y1="340" x2="570" y2="340" stroke="#94a3b8" stroke-dasharray="3,3" stroke-width="2" />
    <text x="685" y="330" font-family="'Outfit', sans-serif" font-size="12" fill="#64748b" text-anchor="middle">4. Return rows</text>

    <!-- Message 5 (Return) -->
    <line x1="550" y1="420" x2="320" y2="420" stroke="#94a3b8" stroke-dasharray="3,3" stroke-width="2" />
    <text x="435" y="410" font-family="'Outfit', sans-serif" font-size="12" fill="#64748b" text-anchor="middle">5. Return JSON payload</text>

    <!-- Message 6 (Complete) -->
    <line x1="300" y1="480" x2="70" y2="480" stroke="#3b82f6" stroke-width="2" />
    <text x="185" y="470" font-family="'Outfit', sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle">6. Audit run complete</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" />
    </marker>
  </defs>
</svg>
