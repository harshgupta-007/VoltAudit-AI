<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Dynamic Accents -->
  <circle cx="640" cy="360" r="400" fill="#3b82f6" opacity="0.03" filter="blur(50px)" />

  <g transform="translate(640, 220)" text-anchor="middle">
    <!-- Lightning Bolt Small Logo -->
    <g transform="translate(-50, -100) scale(0.4)">
      <path d="M 50 180 L 120 250 L 280 90" fill="none" stroke="#f59e0b" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 180 30 L 70 200 L 150 200 L 110 320 L 240 150 L 160 150 Z" fill="#3b82f6" />
    </g>

    <text x="0" y="50" font-family="'Outfit', sans-serif" font-size="54" font-weight="800" fill="#ffffff" letter-spacing="1">Thank You</text>
    <text x="0" y="100" font-family="'Outfit', sans-serif" font-size="24" font-weight="500" fill="#94a3b8">Explore the Open-Source Repository</text>

    <!-- Divider Line -->
    <rect x="-150" y="130" width="300" height="4" fill="url(#accentGrad)" rx="2" />

    <text x="0" y="180" font-family="'Outfit', sans-serif" font-size="20" font-weight="600" fill="#3b82f6" letter-spacing="0.5">github.com/harshgupta-007/VoltAudit-AI</text>
    <text x="0" y="220" font-family="'Outfit', sans-serif" font-size="14" font-weight="400" fill="#64748b">Developed with Google Agent Development Kit</text>
  </g>
</svg>
