<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Modern Geometric Accents -->
  <circle cx="1100" cy="100" r="300" fill="#3b82f6" opacity="0.05" filter="blur(40px)" />
  <circle cx="150" cy="600" r="250" fill="#f59e0b" opacity="0.05" filter="blur(40px)" />

  <!-- Left Side: Integrated Logo Visual -->
  <g transform="translate(180, 160) scale(1.2)">
    <path d="M 50 180 L 120 250 L 280 90" fill="none" stroke="#f59e0b" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
    <path d="M 180 30 L 70 200 L 150 200 L 110 320 L 240 150 L 160 150 Z" fill="#3b82f6" opacity="0.9" />
  </g>

  <!-- Right Side: Title Typography -->
  <g transform="translate(620, 260)">
    <text x="0" y="0" font-family="'Outfit', sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="1">VoltAudit AI</text>
    <text x="0" y="70" font-family="'Outfit', sans-serif" font-size="28" font-weight="500" fill="#94a3b8" letter-spacing="0.5">Intelligent Utility Cost Audits</text>

    <!-- Colored Divider Line -->
    <rect x="0" y="110" width="380" height="6" fill="url(#accentGrad)" rx="3" />

    <text x="0" y="160" font-family="'Outfit', sans-serif" font-size="20" font-weight="600" fill="#3b82f6" letter-spacing="1.5">v1.0.0 ENTERPRISE RELEASE</text>
    <text x="0" y="200" font-family="'Outfit', sans-serif" font-size="16" font-weight="400" fill="#64748b">Google ADK Multi-Agent Orchestration</text>
  </g>
</svg>
