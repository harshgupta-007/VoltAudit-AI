<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(100, 80)">
    <!-- Stylized Audit Checkmark Shield -->
    <path d="M 50 180 L 120 250 L 280 90" fill="none" stroke="url(#checkGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
    <!-- Dynamic Lightning Bolt -->
    <path d="M 180 30 L 70 200 L 150 200 L 110 320 L 240 150 L 160 150 Z" fill="url(#boltGrad)" filter="url(#glow)" opacity="0.9" />
  </g>

  <!-- Text Label -->
  <text x="250" y="440" font-family="'Outfit', sans-serif" font-size="36" font-weight="700" fill="#0f172a" text-anchor="middle" letter-spacing="2">VOLTAUDIT AI</text>
</svg>
