<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#0f172a" rx="20" />

  <text x="50" y="60" font-family="'Outfit', sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="1">TYPOGRAPHY GUIDE</text>
  <text x="50" y="95" font-family="'Outfit', sans-serif" font-size="16" font-weight="400" fill="#94a3b8">Font Family: Outfit (Google Fonts)</text>

  <rect x="50" y="120" width="700" height="2" fill="#1e293b" />

  <!-- H1 heading -->
  <g transform="translate(50, 170)">
    <text x="0" y="0" font-family="'Outfit', sans-serif" font-size="44" font-weight="800" fill="#ffffff">Header 1 (Bold) - 44px</text>
    <text x="0" y="30" font-family="'Outfit', sans-serif" font-size="14" font-weight="400" fill="#64748b">Font-Weight: 800 | Heading titles, presentation covers</text>
  </g>

  <!-- H2 subheading -->
  <g transform="translate(50, 260)">
    <text x="0" y="0" font-family="'Outfit', sans-serif" font-size="24" font-weight="600" fill="#3b82f6">Subheader 2 (Semi-Bold) - 24px</text>
    <text x="0" y="25" font-family="'Outfit', sans-serif" font-size="14" font-weight="400" fill="#64748b">Font-Weight: 600 | Section subtitles, card labels</text>
  </g>

  <!-- Body Text -->
  <g transform="translate(50, 350)">
    <text x="0" y="0" font-family="'Outfit', sans-serif" font-size="16" font-weight="400" fill="#e2e8f0">Body Text (Regular) - 16px</text>
    <text x="0" y="25" font-family="'Outfit', sans-serif" font-size="14" font-weight="400" fill="#94a3b8">VoltAudit AI combines multi-agent system execution logs with secure database layers.</text>
    <text x="0" y="45" font-family="'Outfit', sans-serif" font-size="14" font-weight="400" fill="#64748b">Font-Weight: 400 | UI text fields, narrative reports, descriptions</text>
  </g>
</svg>
